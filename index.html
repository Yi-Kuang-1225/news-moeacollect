<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>輿情戰略資料庫 (人工檢視版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <!-- 引入圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #334155; }
        .fixed-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .tooltip-fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .preserve-newlines br { display: block; content: ""; margin-top: 4px; }
        .modal-fade-in { animation: modalFadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translate(-50%, -48%) scale(0.96); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body class="h-screen flex flex-col antialiased overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex flex-wrap justify-between items-center shrink-0 shadow-sm z-10 gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-slate-800 p-2 rounded-lg text-white shadow-sm">
                <i data-lucide="shield-half" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800">輿情戰略資料庫</h1>
                <p class="text-xs text-slate-500 font-medium tracking-wide flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-500" id="connection-status"></span> 
                    <span id="connection-text">準備連線至 Google Sheets</span>
                </p>
            </div>
        </div>
        
        <div class="flex items-center gap-3 flex-wrap">
            <div class="text-sm text-slate-500 font-medium px-2" id="record-count">共 0 筆紀錄</div>
            
            <input type="file" id="word-upload" accept=".docx" class="hidden" onchange="handleFileUpload(event)">
            <button onclick="document.getElementById('word-upload').click()" class="bg-slate-200 hover:bg-slate-300 text-slate-800 px-4 py-2.5 rounded-md text-sm font-bold transition-colors flex items-center gap-2 shadow-sm border border-slate-300">
                <i data-lucide="file-up" class="w-4 h-4 text-slate-600"></i>
                匯入 Word 檔案
            </button>
            
            <button onclick="syncToGoogleSheets()" id="sync-btn" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-md text-sm font-bold transition-colors items-center gap-2 shadow-sm animate-pulse">
                <i data-lucide="cloud-upload" class="w-4 h-4"></i>
                同步至雲端
            </button>
        </div>
    </header>

    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[60] flex flex-col items-center justify-center">
        <div class="bg-white p-6 rounded-xl shadow-xl flex flex-col items-center border border-slate-200">
            <i data-lucide="loader-2" class="w-8 h-8 text-slate-800 animate-spin mb-3"></i>
            <p class="font-bold text-slate-800 text-lg" id="loading-text">處理中...</p>
        </div>
    </div>

    <main class="flex-1 overflow-auto p-4 md:p-8 relative bg-slate-50">
        <div class="bg-white rounded-lg shadow-sm border border-slate-200 h-full flex flex-col">
            <div class="overflow-auto flex-1">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead class="bg-slate-50 sticky top-0 z-10 shadow-sm">
                        <tr>
                            <th class="py-4 px-6 font-bold text-slate-700 border-b border-slate-200 w-32">日期區間</th>
                            <th class="py-4 px-6 font-bold text-slate-700 border-b border-slate-200 w-48 text-center">回應單位</th>
                            <th class="py-4 px-6 font-bold text-slate-700 border-b border-slate-200 w-[25%]">爭議輿情 / 記者詢問</th>
                            <th class="py-4 px-6 font-bold text-slate-700 border-b border-slate-200 w-auto">簡要應處說明及作為</th>
                            <th class="py-4 px-4 font-bold text-slate-700 border-b border-slate-200 w-20 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="database-body" class="divide-y divide-slate-100">
                        <!-- 資料將由 JS 渲染 -->
                    </tbody>
                </table>
            </div>
            
            <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-slate-400 h-full">
                <i data-lucide="database" class="w-12 h-12 mb-3 opacity-50"></i>
                <p>正在載入資料庫，或資料庫目前為空</p>
            </div>
        </div>
    </main>

    <div id="delete-modal-backdrop" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[70] transition-opacity"></div>
    <div id="delete-modal" class="hidden fixed fixed-center z-[80] w-[90%] max-w-sm bg-white rounded-2xl shadow-2xl border border-slate-200 flex-col modal-fade-in">
        <div class="p-6 text-center">
            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500">
                <i data-lucide="trash-2" class="w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">確定刪除紀錄？</h3>
            <p class="text-sm text-slate-500 mb-6 leading-relaxed">這筆資料將從主畫面中移除。<br>請記得點擊右上角的「<span class="font-bold text-slate-700">同步至雲端</span>」才能將變更儲存到資料庫。</p>
            <div class="flex justify-center gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 py-2.5 rounded-lg text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">取消</button>
                <button onclick="executeDelete()" class="flex-1 py-2.5 rounded-lg text-sm font-bold text-white bg-red-500 hover:bg-red-600 shadow-sm transition-colors">確定刪除</button>
            </div>
        </div>
    </div>

    <script>
        // 安全刷新圖示的函式 (防呆：避免圖示庫載入失敗導致系統崩潰)
        function refreshIcons() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }
        
        // 初始載入
        document.addEventListener("DOMContentLoaded", () => {
            refreshIcons();
        });

        const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwb3dQM7izWDrWikNyduBYKncvg1ZwktWQ74TDk7PFw5Efg5FX859v1deX4kCr3tPwo/exec"; 
        
        let globalDatabase = [];
        let recordToDeleteId = null; // 記錄準備刪除的資料ID

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let bgClass = type === 'error' ? 'bg-red-600' : (type === 'success' ? 'bg-emerald-600' : 'bg-slate-800');
            toast.className = `${bgClass} text-white px-6 py-3 rounded-lg shadow-lg text-sm font-bold tooltip-fade-in flex items-center gap-2`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-4 h-4"></i> ${message}`;
            container.appendChild(toast);
            refreshIcons();
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function renderDatabase() {
            const tbody = document.getElementById('database-body');
            const emptyState = document.getElementById('empty-state');
            
            tbody.innerHTML = '';
            document.getElementById('record-count').textContent = `共 ${globalDatabase.length} 筆紀錄`;

            if (globalDatabase.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }
            
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            // 依日期區間排序 (新到舊)
            globalDatabase.sort((a, b) => b.dateRange.localeCompare(a.dateRange));

            globalDatabase.forEach((row) => {
                let unitTags = row.unit.split(/[、,]/).map(u => 
                    `<span class="inline-flex items-center justify-center bg-blue-900 text-white text-xs font-bold px-3 py-1.5 rounded shadow-sm tracking-wider whitespace-nowrap">${u.trim()}</span>`
                ).join('');

                const tr = document.createElement('tr');
                tr.className = `transition-colors border-l-4 border-transparent hover:border-slate-400 hover:bg-slate-50`;
                
                tr.innerHTML = `
                    <td class="py-5 px-6 align-top text-sm font-medium text-slate-600">${row.dateRange}</td>
                    <td class="py-5 px-6 align-top">
                        <div class="flex flex-wrap justify-center items-start gap-2">
                            ${unitTags}
                        </div>
                    </td>
                    <td class="py-5 px-6 align-top">
                        <div class="font-bold text-slate-800 leading-relaxed">${row.issue}</div>
                    </td>
                    <td class="py-5 px-6 align-top text-sm text-slate-700 leading-relaxed pr-8 preserve-newlines">${row.response}</td>
                    
                    <td class="py-5 px-4 align-top text-center">
                        <button onclick="confirmDelete('${row.id}')" class="text-slate-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors border border-transparent hover:border-red-200" title="刪除此紀錄">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            refreshIcons();
        }

        function confirmDelete(id) {
            recordToDeleteId = id;
            document.getElementById('delete-modal-backdrop').classList.remove('hidden');
            const modal = document.getElementById('delete-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeDeleteModal() {
            recordToDeleteId = null;
            document.getElementById('delete-modal-backdrop').classList.add('hidden');
            const modal = document.getElementById('delete-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function executeDelete() {
            if (recordToDeleteId) {
                // 從陣列中移除該筆資料
                globalDatabase = globalDatabase.filter(item => item.id !== recordToDeleteId);
                renderDatabase();
                showToast("已刪除紀錄，請記得同步至雲端", "success");
                showSyncButton();
                closeDeleteModal();
            }
        }

        function showSyncButton() {
            const btn = document.getElementById('sync-btn');
            btn.classList.remove('hidden');
            btn.classList.add('flex');
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file || !file.name.endsWith('.docx')) {
                if(file) showToast("請上傳 .docx 格式的 Word 檔案", "error");
                return;
            }

            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            const reader = new FileReader();
            reader.onload = function(loadEvent) {
                const arrayBuffer = loadEvent.target.result;
                
                mammoth.convertToHtml({arrayBuffer: arrayBuffer})
                    .then(function(result) {
                        const htmlString = result.value;
                        const parsedData = parseHtmlTable(htmlString);
                        
                        if(parsedData.length > 0) {
                            // 單純將新資料加進來，不進行任何複雜的比對防呆
                            globalDatabase = [...parsedData, ...globalDatabase];
                            renderDatabase();
                            showToast(`成功匯入 ${parsedData.length} 筆資料！`, "success");
                            showSyncButton();
                        } else {
                            showToast("未能從檔案中找到符合格式的表格", "error");
                        }
                    })
                    .catch(function(err) {
                        console.error(err);
                        showToast("Word 解析失敗，請確認檔案結構", "error");
                    })
                    .finally(() => {
                        overlay.classList.add('hidden');
                        overlay.classList.remove('flex');
                        event.target.value = ''; 
                    });
            };
            reader.readAsArrayBuffer(file);
        }

        function parseHtmlTable(htmlString) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, "text/html");
            const newData = [];
            let globalDate = "本週新增";
            
            const paragraphs = doc.querySelectorAll('p');
            for(let p of paragraphs) {
                const text = p.textContent;
                if(text.includes('每週輿情預判') && text.includes('（')) {
                    const match = text.match(/（(.*?)）/);
                    if(match) globalDate = match[1];
                    break;
                }
            }

            const tables = doc.querySelectorAll('table');
            if(tables.length === 0) return newData;

            const rows = tables[0].querySelectorAll('tr');
            for(let i = 1; i < rows.length; i++) {
                const cells = rows[i].querySelectorAll('td');
                if(cells.length >= 3) {
                    const col1 = cells[0].textContent.trim();
                    let col2 = cells[1].innerHTML.replace(/<p>/g, '').replace(/<\/p>/g, '<br>').trim();
                    if(col2.endsWith('<br>')) col2 = col2.slice(0, -4);
                    const col3 = cells[2].textContent.trim();

                    if(!col1 && !col2) continue; 
                    
                    let unit = "未註明";
                    let issue = col1;
                    const unitMatch = col1.match(/【(.*?)】/);
                    if(unitMatch) {
                        unit = unitMatch[1];
                        issue = col1.replace(/【.*?】/, '').trim();
                    }

                    newData.push({
                        id: "DOC-" + Date.now() + "-" + i + "-" + Math.floor(Math.random()*10000),
                        dateRange: globalDate,
                        unit: unit,
                        issue: issue,
                        response: col2
                    });
                }
            }
            return newData;
        }

        async function fetchFromGoogleSheets() {
            const emptyState = document.getElementById('empty-state');
            emptyState.classList.remove('hidden');
            emptyState.classList.add('flex');
            emptyState.innerHTML = `<i data-lucide="loader-2" class="w-12 h-12 mb-3 text-slate-400 animate-spin"></i><p>正在從雲端同步歷史資料庫...</p>`;
            refreshIcons();

            try {
                const response = await fetch(GOOGLE_APP_SCRIPT_URL, {
                    method: 'GET',
                    redirect: 'follow'
                });
                if (!response.ok) throw new Error('網路連線異常');
                
                const data = await response.json();
                
                if (data && Array.isArray(data)) {
                    globalDatabase = data;
                    document.getElementById('connection-text').textContent = "連線狀態：正常";
                    renderDatabase(); 
                } else {
                    renderDatabase(); 
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('connection-status').classList.replace('bg-emerald-500', 'bg-red-500');
                document.getElementById('connection-text').textContent = "無法連線至雲端";
                emptyState.innerHTML = `
                    <div class="text-red-500 flex flex-col items-center text-center max-w-md">
                        <i data-lucide="shield-alert" class="w-12 h-12 mb-3 opacity-80"></i>
                        <p class="font-bold text-lg mb-1">無法讀取雲端資料庫</p>
                        <button onclick="fetchFromGoogleSheets()" class="mt-5 bg-slate-800 hover:bg-slate-700 text-white px-5 py-2.5 rounded-md text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            重新嘗試連線
                        </button>
                    </div>`;
                refreshIcons();
                showToast("讀取雲端資料庫失敗", "error");
            }
        }

        async function syncToGoogleSheets() {
            if(!GOOGLE_APP_SCRIPT_URL) return;

            const btn = document.getElementById('sync-btn');
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 同步中...`;
            btn.classList.remove('animate-pulse');
            
            try {
                await fetch(GOOGLE_APP_SCRIPT_URL, {
                    method: 'POST',
                    // 改用 text/plain 可以繞過瀏覽器嚴格的 CORS 檢查，確保資料順利抵達 GAS
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(globalDatabase)
                });
                
                showToast("已成功同步至 Google 試算表！", "success");
                btn.innerHTML = `<i data-lucide="cloud-check" class="w-4 h-4"></i> 同步完成`;
                
                setTimeout(() => {
                    btn.classList.add('hidden');
                    btn.classList.remove('flex');
                    btn.innerHTML = `<i data-lucide="cloud-upload" class="w-4 h-4"></i> 同步至雲端`;
                }, 3000);

            } catch(e) {
                showToast("同步失敗，請檢查網路連線", "error");
                btn.innerHTML = `<i data-lucide="cloud-upload" class="w-4 h-4"></i> 重新同步`;
            }
        }

        window.onload = function() {
            fetchFromGoogleSheets();
        };
    </script>
</body>
</html>
